<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Օնլայն Գրանցում | Bloom Mood</title>
    <style>
        :root {
            --bg-color: #F7F4EE;      
            --text-main: #4A3E3D;     
            --accent-gold: #C5A880;   
            --white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .register-card {
            background-color: var(--white);
            padding: 45px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(74, 62, 61, 0.05);
            width: 100%;
            max-width: 480px;
            border-top: 4px solid var(--accent-gold);
        }

        .card-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .card-logo img {
            height: 45px;
            object-fit: contain;
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 20px;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #7A6E6D;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(197, 168, 128, 0.4);
            background-color: #FCFAF7;
            color: var(--text-main);
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--text-main);
            background-color: var(--white);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--text-main);
            color: var(--white);
            border: 1px solid var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: transparent;
            color: var(--text-main);
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="card-logo">
            <img src="logo.png" alt="Bloom Mood">
        </div>
        
        <h2>Օնլայն Ամրագրում</h2>
        
        <form id="bookingForm" onsubmit="handleRegistration(event)">
            <div class="form-group">
                <label for="fullName">Անուն Ազգանուն *</label>
                <input type="text" id="fullName" required placeholder="Մարիամ Գրիգորյան">
            </div>

            <div class="form-group">
                <label for="phoneNumber">Հեռախոսահամար *</label>
                <input type="tel" id="phoneNumber" required placeholder="+374 99 000000">
            </div>

            <div class="form-group">
                <label for="serviceSelect">Ընտրել Ծառայությունը *</label>
                <select id="serviceSelect" required>
                    <option value="" disabled selected>Ընտրեք բաժինը...</option>
                    <option value="Ոչ ներարկումային կոսմետոլոգիա">Ոչ ներարկումային կոսմետոլոգիա</option>
                    <option value="Ներարկումային կոսմետոլոգիա">Ներարկումային կոսմետոլոգիա</option>
                    <option value="Վարսահարդարում">Վարսահարդարում</option>
                    <option value="Դիմահարդարում">Դիմահարդարում</option>
                    <option value="Մատնահարդարում / Ոտնահարդարում">Մատնահարդարում / Ոտնահարդարում</option>
                    <option value="Հոնքեր & Թարթիչներ">Հոնքեր & Թարթիչներ</option>
                    <option value="Ուսումնական Դասընթաց">Basic Makeup & Styling Course</option>
                </select>
            </div>

            <div class="form-group">
                <label for="bookingDate">Նախընտրելի Օր և Ժամ *</label>
                <input type="datetime-local" id="bookingDate" required>
            </div>

            <button type="submit" class="btn-submit">Հաստատել Գրանցումը</button>
        </form>

        <a href="index.html" class="back-btn">⬅ Վերադառնալ Գլխավոր Էջ</a>
    </div>

    <script>
        function handleRegistration(event) {
            event.preventDefault(); // Կանխում է էջի դատարկ թարմացումը
            
            // Վերցնում ենք օգտատիրոջ գրած տվյալները
            const name = document.getElementById('fullName').value;
            const service = document.getElementById('serviceSelect').value;
            
            // Ցուցադրում ենք էսթետիկ հաղորդագրություն
            alert(`Շնորհակալություն, հարգելի ${name}։\n\nՁեր հայտը «${service}» բաժնում հաջողությամբ գրանցվել է։ Bloom Mood ստուդիան կապ կհաստատի Ձեզ հետ գրանցումը վերջնական հաստատելու համար։`);
            
            // Գրանցումից հետո ավտոմատ հետ է տանում գլխավոր էջ
            window.location.href = "index.html"; 
        }
    </script>

</body>
</html>
